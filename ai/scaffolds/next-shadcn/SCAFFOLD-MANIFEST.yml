steps:
  # WHY THIS STASH IS REQUIRED:
  # Before the manifest steps run, runCreate copies the entire scaffold template
  # (including SCAFFOLD-MANIFEST.yml, README.md, index.md) into the destination
  # folder. This makes the folder non-empty before shadcn init runs.
  #
  # `npx shadcn@latest init -t next` calls `create-next-app` under the hood.
  # create-next-app refuses non-empty destination directories and exits with:
  #   "The directory <name> contains files that could conflict: SCAFFOLD-MANIFEST.yml"
  #
  # Without the stash, the scaffold fails immediately at the shadcn init step.
  # The stash temporarily moves those aidd-owned files to a hidden directory so
  # create-next-app sees an empty destination, then restores them afterwards.
  # Verified: npx create-next-app@latest . --yes in a directory containing
  # SCAFFOLD-MANIFEST.yml exits 1 with the conflict error above.
  - run: node stash.mjs
  - run: npx shadcn@latest init -t next
  - run: node .aidd-scaffold-stash/restore.mjs
  # Install the AIDD framework before any prompt: step — agents need ai/ and skills when the prompt runs.
  - run: npx aidd .
  - run: npx shadcn@latest add button
  - run: npm install --save-dev vitest @vitejs/plugin-react @playwright/test error-causes
  - run: npm pkg set scripts.test="vitest run" scripts.test:e2e="playwright test"
  - prompt: >
      Wire the Button component into app/page.tsx. Create a minimal vitest.config.ts
      and a smoke test in __tests__/page.test.ts that confirms the home page renders
      without errors. Verify the project builds with npm run build and npm test passes.
